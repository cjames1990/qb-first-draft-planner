        const correlations = { /* your original correlations unchanged */

            "Default": {hero: [], late: []}
        };

        async function loadLiveADP() {
            const statusEl = document.getElementById('adpStatus');
            statusEl.textContent = '🔄 Fetching fresh ADP from bbmdb.com...';
            try {
                const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://bbmdb.com/');
                const res = await fetch(proxy);
                const html = await res.text();

                // Parse the Markdown table (bbmdb.com renders it this way)
                const lines = html.split('\n');
                const tableStart = lines.findIndex(l => l.includes('| Player | Pos | ADP |'));
                if (tableStart === -1) throw new Error('Table not found');

                players = { qb: {}, rb: {}, wr: {}, te: {} };

                for (let i = tableStart + 2; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line.startsWith('|')) break;
                    const cols = line.split('|').map(c => c.trim()).filter(c => c);
                    if (cols.length < 3) continue;

                    const name = cols[0];
                    const posRaw = cols[1];
                    const adp = parseFloat(cols[2]);
                    if (!name || isNaN(adp)) continue;

                    const pos = posRaw.substring(0,2).toUpperCase();
                    const team = staticTeamMap[name] || '';

                    if (pos === 'QB') players.qb[name] = {adp, team};
                    else if (pos === 'RB') players.rb[name] = {adp, team};
                    else if (pos === 'WR') players.wr[name] = {adp, team};
                    else if (pos === 'TE') players.te[name] = {adp, team};
                }

                statusEl.innerHTML = `✅ LIVE ADP loaded from bbmdb.com • ${new Date().toLocaleString()}`;
                console.log('✅ Full live scrape successful —', Object.keys(players.qb).length, 'QBs loaded');
                return true;
            } catch (e) {
                console.warn('Live scrape failed, using static data', e);
                statusEl.textContent = '⚠️ Using cached ADP (click Refresh for latest)';
                return false;
            }
        }

        function populateSelectors() {
            // Draft slots (always works)
            const slotSelect = document.getElementById('draftSlot');
            slotSelect.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = `Slot ${i}`;
                slotSelect.appendChild(opt);
            }

            // QB selector — sorted by ADP
            const qbSelect = document.getElementById('selectedQB');
            qbSelect.innerHTML = '';
            Object.keys(players.qb)
                .sort((a, b) => players.qb[a].adp - players.qb[b].adp)
                .forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = `${name} (${players.qb[name].team || '?'} – ADP ${players.qb[name].adp.toFixed(1)})`;
                    qbSelect.appendChild(opt);
                });
        }

        async function refreshADP() {
            const success = await loadLiveADP();
            if (success || Object.keys(players.qb).length > 0) {
                populateSelectors();
                alert('✅ ADP updated and selectors refreshed!');
            } else {
                alert('⚠️ Could not reach bbmdb.com right now — using latest cached data');
            }
        }

        function init() {
            loadStaticData();           // Always have data
            loadLiveADP().then(() => {  // Try live update immediately
                populateSelectors();
            });
        }

        // === Rest of your original functions (generatePlanHTML, getRealisticStacks, etc.) ===
        // (They remain exactly the same as before — just using the new players object)

        function getRealisticStacks(qbName, qbAdp) { /* your exact function */ 
            // ... (unchanged, using the new players object)
            const qbTeam = players.qb[qbName]?.team || staticTeamMap[qbName] || '';
            const qbPick = Math.round(qbAdp);
            const maxReachPick = qbPick - 12;
            const corr = correlations[qbName] || correlations.Default;
            const allPlayers = {...players.wr, ...players.te, ...players.rb};
            // ... rest of function exactly as you had
            let heroStacks = [];
            let lateStacks = [];
            // hero / late logic...
            return { hero: heroStacks.slice(0,3), late: lateStacks.slice(0,3) };
        }

        }
